<!DOCTYPE html>

<head>

    }

    .links {
      display: grid;
      gap: 12px;

    }

    .link-button {

      padding: 14px 16px;

      color: white;
      text-decoration: none;
      border-radius: 12px;
      text-align: center;
    }

    .link-button:hover {
      opacity: 0.85;

    footer {
